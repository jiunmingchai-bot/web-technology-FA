<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Lost & Found</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Campus Lost & Found System</h1>
        <nav>
            <button id="show-form-btn">Report an Item</button>
            <button id="show-items-btn">View All Items</button>
        </nav>
    </header>

    <main>
        <section id="form-section">
            <h2>Submit a Report</h2>
            <form id="report-form">
                <div class="form-group">
                    <label for="title">Item Title:</label>
                    <input type="text" id="title" name="title" required>
                </div>

                <div class="form-group">
                    <label for="description">Description:</label>
                    <textarea id="description" name="description" rows="4" required></textarea>
                </div>

                <div class="form-group">
                    <label for="category">Category:</label>
                    <select id="category" name="category" required>
                        <option value="Lost">Lost</option>
                        <option value="Found">Found</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="location">Location:</label>
                    <input type="text" id="location" name="location" required>
                </div>

                <div class="form-group">
                    <label for="item_date">Date:</label>
                    <input type="date" id="item_date" name="item_date" required>
                </div>

                <div class="form-group">
                    <label for="contact_info">Contact Information:</label>
                    <input type="text" id="contact_info" name="contact_info" placeholder="Phone or Email" required>
                </div>

                <button type="submit">Submit Report</button>
            </form>
        </section>

        <section id="items-section" style="display: none;">
            <h2>Lost & Found Items</h2>
            <div id="items-container" class="grid-container">
                </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Quest International University - Lost & Found System</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
